site_name: 技術筆記 (Tech Notes)
site_author: Teddy

theme:
  name: material
  language: zh-Hant
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切換至深色模式
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切換至淺色模式

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      guess_lang: false
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - nl2br

nav:
  - 📚 Java 開發:
    - Null 處理的最佳實踐: java-null-handling.md
  - 📐 DDD 筆記:
    - 從時序圖解析 Domain Model 的互動邊界與職責: ddd-series/02-architecture/01-domain-interaction-boundaries.md
    - 關聯 (Associations) 與模型導航: ddd-series/03-building-blocks/01-associations.md
    - Entity, Value Object, Domain Service, Module: ddd-series/03-building-blocks/02-entities-value-objects-services.md
    - 聚合 (Aggregates) 與資料變更邊界: ddd-series/03-building-blocks/03-aggregates.md
